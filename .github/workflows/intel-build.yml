name: Intel macOS Build (unofficial)

# Builds an Intel (x86_64) macOS .dmg of LLM Wiki for a given upstream
# tag and publishes it as a "<tag>-intel" release on THIS fork.
#
# Why this exists: upstream (nashsu/llm_wiki) ships no Intel macOS
# artifact — its release matrix builds Apple Silicon (aarch64) only.
# An Intel matrix entry was merged (PR #416) then dropped again in a
# later feature commit, so Intel users remain unserved. This pipeline
# fills the gap on GitHub's last Intel runner (macos-13), as a NATIVE
# build (no cross-compile). GPLv3 redistribution of an unmodified
# upstream tag — not an official release.
#
# Trigger manually: Actions -> Intel macOS Build -> Run workflow, enter
# the upstream tag (e.g. v0.5.2). A daily schedule auto-builds EVERY
# upstream tag (>= v0.4.24) that still lacks a "<tag>-intel" release,
# so versions released between two cron runs are never skipped.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag to build (e.g. v0.5.2)'
        required: true
        type: string
  schedule:
    # Daily 06:00 UTC — auto-build every upstream tag still missing an
    # Intel release (not just the latest).
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.pick.outputs.tags }}
    steps:
      - name: Resolve tags to build
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Manual dispatch: build exactly the requested tag (always,
          # even if a release already exists — supports fix rebuilds).
          if [ -n "${INPUT_TAG:-}" ]; then
            printf 'tags=["%s"]\n' "$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "Manual build: $INPUT_TAG"
            exit 0
          fi
          # Scheduled: build every upstream tag >= FLOOR that has no
          # <tag>-intel release yet. FLOOR avoids ancient tags that
          # predate the Intel-buildable era.
          FLOOR="v0.4.24"
          missing=""
          while read -r t; do
            [ -n "$t" ] || continue
            # keep only t >= FLOOR (min(FLOOR,t) == FLOOR)
            [ "$(printf '%s\n%s\n' "$FLOOR" "$t" | sort -V | head -1)" = "$FLOOR" ] || continue
            if ! gh release view "${t}-intel" --repo "$REPO" >/dev/null 2>&1; then
              missing="$missing $t"
            fi
          done < <(gh api repos/nashsu/llm_wiki/tags --paginate --jq '.[].name' | grep -E '^v[0-9]' | sort -V)
          arr=$(printf '%s\n' $missing | sed '/^$/d' | jq -R . | jq -s -c .)
          echo "Missing intel tags: $arr"
          printf 'tags=%s\n' "$arr" >> "$GITHUB_OUTPUT"

  build-intel:
    needs: resolve-tags
    if: needs.resolve-tags.outputs.tags != '[]'
    # GitHub retired the macos-13 hosted runner (jobs queue forever and
    # never get scheduled), and arm64->x86_64 cross-compile is blocked by
    # lance-linalg (AVX-512). So we build natively on a self-hosted Intel
    # Mac registered to this fork (label: intel-imac).
    runs-on: [self-hosted, intel-imac]
    strategy:
      fail-fast: false
      # One self-hosted Intel runner — build tags one at a time.
      max-parallel: 1
      matrix:
        tag: ${{ fromJson(needs.resolve-tags.outputs.tags) }}
    env:
      TAG: ${{ matrix.tag }}
    steps:
      - name: Checkout upstream tag
        uses: actions/checkout@v4
        with:
          repository: nashsu/llm_wiki
          ref: ${{ matrix.tag }}

      - name: Install Rust stable (x86_64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install protoc
        run: brew install protobuf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare MCP server resources
        run: |
          npm --prefix mcp-server ci
          npm run mcp:build

      # The bundled libpdfium.dylib is arm64 (matches upstream's aarch64
      # macOS build). Swap in the committed Intel binary so the x86_64
      # .app links the correct PDFium, or PDF features crash at runtime.
      - name: Use x86_64 PDFium binary
        run: |
          set -euo pipefail
          # Old tags (v0.4.24 / v0.4.25) predate the committed Intel
          # PDFium binary — it was added at v0.4.26. The arm64 dylib is
          # byte-identical from v0.4.24 through v0.5.4 (same PDFium
          # version), so v0.4.26's libpdfium-x86_64.dylib is the exact
          # Intel counterpart. Fetch it when this tag lacks it.
          if [ ! -f src-tauri/pdfium/libpdfium-x86_64.dylib ]; then
            echo "Intel PDFium missing at this tag; fetching from v0.4.26"
            curl -fsSL -o src-tauri/pdfium/libpdfium-x86_64.dylib \
              https://github.com/nashsu/llm_wiki/raw/v0.4.26/src-tauri/pdfium/libpdfium-x86_64.dylib
          fi
          cp src-tauri/pdfium/libpdfium-x86_64.dylib src-tauri/pdfium/libpdfium.dylib
          file src-tauri/pdfium/libpdfium.dylib
          lipo -info src-tauri/pdfium/libpdfium.dylib

      - name: Build Tauri app (Intel)
        run: npx tauri build --target x86_64-apple-darwin

      - name: Locate .dmg (fallback to hdiutil if bundler failed)
        id: dmg
        run: |
          set -euo pipefail
          BASE="src-tauri/target/x86_64-apple-darwin/release/bundle"
          DMG=$(find "$BASE/dmg" -name '*.dmg' 2>/dev/null | head -1 || true)
          if [ -z "$DMG" ]; then
            echo "tauri DMG bundler produced nothing — building DMG manually."
            APP=$(find "$BASE/macos" -name '*.app' -maxdepth 1 | head -1)
            STAGE=$(mktemp -d)
            cp -R "$APP" "$STAGE/"
            ln -s /Applications "$STAGE/Applications"
            mkdir -p "$BASE/dmg"
            DMG="$BASE/dmg/LLM Wiki_${TAG}_x64.dmg"
            hdiutil create -volname "LLM Wiki" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
            rm -rf "$STAGE"
          fi
          echo "Found DMG: $DMG"
          lipo -info "$(find "$BASE/macos" -name 'llm-wiki' -path '*MacOS*' | head -1)"
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Publish Intel release on this fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > /tmp/notes.md <<EOF
          Unofficial Intel macOS build of LLM Wiki ${TAG}.

          Upstream (nashsu/llm_wiki) ships no Intel (x86_64) macOS artifact — its release matrix builds Apple Silicon (aarch64) only. This release fills that gap for Intel Mac users.

          - **Source:** built from unmodified upstream tag ${TAG}.
          - **Arch:** x86_64-apple-darwin (Intel). Built natively on a macos-13 runner.
          - **PDFium:** Intel (x86_64) binary swapped in, so PDF import works.
          - **License:** GPLv3 — Copyright (C) 2024-2026 Yong Su. Redistribution under GPLv3, not an official release.

          ⚠️ **Not code-signed / notarized.** On first launch macOS Gatekeeper will block it. Right-click the app -> Open, or run:
          \`\`\`
          xattr -dr com.apple.quarantine "/Applications/LLM Wiki.app"
          \`\`\`

          🤖 Built by an automated pipeline on this fork.
          EOF
          DEST="LLM-Wiki-${TAG}-macOS-Intel-x86_64.dmg"
          cp "${{ steps.dmg.outputs.path }}" "/tmp/${DEST}"
          gh release create "${TAG}-intel" \
            --repo "${{ github.repository }}" \
            --target main \
            --title "LLM Wiki ${TAG} — macOS Intel (x86_64) [unofficial]" \
            --notes-file /tmp/notes.md \
            "/tmp/${DEST}"
